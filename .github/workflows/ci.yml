name: CI

on:
  push:
    branches: [ "main", "dev", "Hackathon_2026" ]
  pull_request:
    branches: [ "main", "dev", "Hackathon_2026" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install server dependencies
        if: hashFiles('server/package.json') != ''
        working-directory: server
        run: npm install

      - name: Install client dependencies
        if: hashFiles('client/package.json') != ''
        working-directory: client
        run: npm install

      - name: Run server tests
        if: hashFiles('server/package.json') != ''
        working-directory: server
        run: npm test

      - name: Build client
        if: hashFiles('client/package.json') != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Hackathon_2026')
        working-directory: client
        run: npm run build

      - name: Create build archive
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Hackathon_2026'
        run: |
          mkdir -p dist
          zip -r dist/peppers-market-${{ github.sha }}.zip client/dist/

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Hackathon_2026'
        uses: actions/upload-artifact@v4
        with:
          name: peppers-market-${{ github.run_number }}-${{ github.sha }}
          path: dist/peppers-market-${{ github.sha }}.zip
          if-no-files-found: error
          retention-days: 14
